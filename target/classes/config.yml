# AbuseLogger Config

# Radius (in chunks) to check for nearby claims
radius: 2

# /abuselogger info komutu için gösterilecek maksimum kayıt sayısı
info-count: 5

# Message settings (MiniMessage supported)
messages:
  # Log file format
  # Placeholders: {date}, {player}, {claim}, {action}, {x}, {y}, {z}
  log_format: "[{date}] {player} isimli oyuncu {claim} isimli arazinin etrafında {action}. Koordinatlar: {x}, {y}, {z}"

  # Admin in-game notification
  # Clickable to teleport
  admin_notification: "<yellow>{player}</yellow> isimli oyuncu <gold>{claim}</gold> isimli arazinin etrafında <red>{action}</red>. <click:run_command:'/tp {x} {y} {z}'><aqua>İlgili eylemin koordinatına ışınlanmak için bu mesaja tıkla!</aqua></click>"

  # Player in-game notification (for claim members)
  player_notification: "<yellow>{player}</yellow> isimli oyuncu senin veya üyesi olduğun <gold>{claim}</gold> arazisinin etrafında <red>{action}</red>."

  # Toggle messages
  alerts_enabled: "<green>Bildirimler açıldı.</green>"
  alerts_disabled: "<red>Bildirimler kapatıldı.</red>"
  no_permission: "<red>Bu komutu kullanmak için yetkiniz yok!</red>"
  reload: "<green>Yapılandırma başarıyla yenilendi.</green>"

  # Info command — player modu
  # Placeholders: {player}, {count}
  info_header: "<gray>--- [ <gold>{player} — Son {count} Kayıt</gold> ] ---</gray>"
  # Placeholders: {date}, {action}, {claim}, {x}, {y}, {z}
  info_format: "<white>{date}</white> <gray>-</gray> <yellow>{action}</yellow> <gray>({claim})</gray> <click:run_command:'/tp {x} {y} {z}'><aqua>[Işınlan]</aqua></click>"
  no_records: "<red>{player} isimli oyuncunun taciz kaydı yok.</red>"

  # Info command — claim modu
  # Placeholders: {claim}, {count}
  info_claim_header: "<gray>--- [ <gold>{claim} Arazisi — Son {count} Taciz</gold> ] ---</gray>"
  # Placeholders: {date}, {player}, {action}, {claim}, {x}, {y}, {z}
  info_claim_format: "<white>{date}</white> <gray>-</gray> <yellow>{player}</yellow> <gray>→</gray> <red>{action}</red> <click:run_command:'/tp {x} {y} {z}'><aqua>[Işınlan]</aqua></click>"
  no_records_claim: "<red>{claim} arazisine ait taciz kaydı yok.</red>"

  # Usage hint
  info_usage: "<red>Kullanım: /abuselogger info player <oyuncu> | info claim <arazi></red>"

# Localized action names
actions:
  break: "Blok kırdı"
  place: "Blok koydu"
  ignite: "Yakma işlemi yaptı"
  bucket_empty: "Kova boşalttı"

# -------------------------------------------------------
#   Discord Webhook (optional)
# -------------------------------------------------------
webhook:
  enabled: false
  url: "YOUR_WEBHOOK_URL_HERE"
  embed:
    title: "AbuseLogger"
    description: "{player} isimli oyuncu {claim} isimli arazinin etrafında {action}. Koordinatlar: {x}, {y}, {z}"
    color: "#CC0000"
    thumbnail-url: ""
    footer: "AbuseLogger Plugin"
    timestamp: true
